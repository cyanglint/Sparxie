<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스파키 계산기</title>
    <style>
        :root {
            --bg-color: #0f1218;
            --card-bg: #1c212d;
            --accent-color: #4a90e2;
            --text-color: #e0e0e0;
            --highlight: #f39c12;
            --border-color: #34495e;
            --disabled-opacity: 0.25;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }

        .container {
            width: 100%; max-width: 500px;
            background: var(--card-bg); border-radius: 16px;
            padding: 30px; border: 1px solid var(--border-color);
        }

        h1 { text-align: center; font-size: 1.3rem; margin-bottom: 25px; color: var(--accent-color); letter-spacing: 1px; }

        .section { margin-bottom: 20px; }
        .section-title { font-size: 0.85rem; color: #888; margin-bottom: 12px; border-left: 3px solid var(--accent-color); padding-left: 10px; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; min-height: 65px; }
        .input-box { display: flex; flex-direction: column; transition: opacity 0.3s; }
        .input-box.disabled { opacity: var(--disabled-opacity); pointer-events: none; }
        
        label { font-size: 0.75rem; margin-bottom: 4px; color: #aaa; }
        input[type="number"] {
            background: #2c3e50; border: 1px solid var(--border-color);
            color: white; padding: 10px; border-radius: 8px; font-size: 0.95rem;
        }

        .buff-group { display: flex; flex-direction: column; gap: 6px; }
        .checkbox-container {
            display: flex; align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 10px 14px; border-radius: 8px; cursor: pointer;
            transition: all 0.3s; border: 1px solid transparent;
        }
        .checkbox-container.active { background: rgba(74, 144, 226, 0.08); border-color: rgba(74, 144, 226, 0.3); }
        .checkbox-container input { margin-right: 12px; }

        .sub-option-wrapper { min-height: 45px; margin-top: 4px; transition: opacity 0.3s; }
        .sub-option-wrapper.disabled { opacity: var(--disabled-opacity); pointer-events: none; }
        .sub-option { margin-left: 20px; font-size: 0.85rem; }

        .results {
            background: rgba(74, 144, 226, 0.05);
            border-radius: 12px; padding: 18px; margin-top: 20px;
            border: 1px solid rgba(74, 144, 226, 0.2);
        }

        .result-item { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.9rem; }
        .av-details { font-size: 0.8rem; color: #777; transition: opacity 0.3s; }
        .av-details.hidden { display: none; }

        .main-result-area {
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 12px; margin-top: 10px; text-align: right;
        }
        .target-val { font-size: 1.3rem; font-weight: bold; color: var(--highlight); margin: 2px 0; }
        .val { font-family: 'Monaco', 'Consolas', monospace; }

        #debugBtn {
            background: none; border: 1px solid #444; color: #777;
            padding: 5px 10px; border-radius: 4px; font-size: 0.7rem;
            cursor: pointer; margin-top: 15px; transition: all 0.2s;
            width: 100%; display: none;
        }
        #debugBtn:hover { color: var(--text-color); border-color: #666; }
        .debug-box {
            margin-top: 10px; padding: 12px; background: rgba(0,0,0,0.3);
            border-radius: 8px; font-size: 0.75rem; color: #999;
            line-height: 1.6; display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SPEED CALCULATOR</h1>

    <div class="section">
        <div class="section-title">캐릭터 마을 속도</div>
        <div class="input-grid">
            <div class="input-box"><label>은랑</label><input type="number" id="swBase" value="200" step="0.1" oninput="calculate()"></div>
            <div class="input-box"><label>효광</label><input type="number" id="hkBase" value="200" step="0.1" oninput="calculate()"></div>
        </div>
        <div class="input-grid" style="margin-top:8px;">
            <div class="input-box" id="hyBox"><label>히아킨 (2돌 시)</label><input type="number" id="hyBase" value="200" step="0.1" oninput="calculate()"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">버프 활성화</div>
        <div class="buff-group">
            <label class="checkbox-container" id="lblHK"><input type="checkbox" id="buffHK" onchange="updateUI()"> 효광 2돌 (12%)</label>
            <label class="checkbox-container" id="lblHH"><input type="checkbox" id="buffHH" onchange="updateUI()"> 곽향 1돌 (12%)</label>
            <label class="checkbox-container" id="lblHY"><input type="checkbox" id="buffHY" onchange="updateUI()"> 히아킨 2돌 (38%, 지연 적용)</label>
            <div id="msWrapper" class="sub-option-wrapper">
                <label class="checkbox-container sub-option" id="lblMS">
                    <input type="checkbox" id="buffMS" onchange="updateUI()"> ㄴ 메신저 사용 (+12%)
                </label>
            </div>
        </div>
    </div>

    <div class="results">
        <div class="result-item"><span>은랑 전투 속도</span><span class="val" id="resSW">-</span></div>
        <div class="result-item"><span>효광 전투 속도</span><span class="val" id="resHK">-</span></div>
        <div class="result-item"><span>아하 전투 속도</span><span class="val" id="resAhaV">-</span></div>
        
        <div id="avDisplay" class="av-details">
            <div class="result-item"><span>ㄴ 아하 첫 턴 AV</span><span class="val" id="resAhaAv">-</span></div>
            <div class="result-item" style="color:var(--accent-color)"><span>ㄴ 스파키 첫 턴 AV</span><span class="val" id="resSpAv">-</span></div>
        </div>

        <div class="main-result-area">
            <div style="font-size:0.8rem; color:#888;">스파키 목표 마을 속도</div>
            <div class="target-val" id="resSpTarget">-</div>
            <div class="combat-sub">스파키 전투 속도: <span id="resSP" class="val" style="color:var(--text-color)">-</span></div>
        </div>
    </div>

    <button id="debugBtn" onclick="toggleDebug()">[상세 검산 데이터 확인]</button>
    <div id="debugBox" class="debug-box"></div>
</div>

<script>
    function toggleDebug() {
        const box = document.getElementById('debugBox');
        box.style.display = (box.style.display === 'block') ? 'none' : 'block';
    }

    function updateUI() {
        const isHy = document.getElementById('buffHY').checked;
        document.getElementById('hyBox').classList.toggle('disabled', !isHy);
        document.getElementById('msWrapper').classList.toggle('disabled', !isHy);
        document.getElementById('avDisplay').classList.toggle('hidden', !isHy);
        const debugBtn = document.getElementById('debugBtn');
        if (isHy) debugBtn.style.display = 'block';
        else { debugBtn.style.display = 'none'; document.getElementById('debugBox').style.display = 'none'; }
        ['HK', 'HH', 'HY', 'MS'].forEach(id => {
            const cb = document.getElementById('buff' + id);
            document.getElementById('lbl' + id).classList.toggle('active', cb.checked);
        });
        if (!isHy) document.getElementById('buffMS').checked = false;
        calculate();
    }

    function calculate() {
        const STATS = { SW: 110, HK: 101, SP: 107, HY: 100 };
        const swBase = parseFloat(document.getElementById('swBase').value) || 0;
        const hkBase = parseFloat(document.getElementById('hkBase').value) || 0;
        const hyBase = parseFloat(document.getElementById('hyBase').value) || 0;
        const bHK = document.getElementById('buffHK').checked;
        const bHH = document.getElementById('buffHH').checked;
        const bHY = document.getElementById('buffHY').checked;
        const bMS = document.getElementById('buffMS').checked;

        const getCB = (s) => (bHK ? s * 0.12 : 0) + (bHH ? s * 0.12 : 0);
        const swPre = swBase + getCB(STATS.SW), hkPre = hkBase + getCB(STATS.HK);
        const hyPre = hyBase + getCB(STATS.HY);

        function getAhaSpeed(v1, v2, v3) {
            const sorted = [v1, v2, v3].sort((a, b) => b - a);
            return 80 + (sorted[0] / 5) + (sorted[1] / 10) + (sorted[2] / 20);
        }

        function runSim(spBase) {
            const spPre = spBase + getCB(STATS.SP);
            
            // 시점 정의
            const tHy = bHY ? 10000 / hyPre : 0; // 히아킨 행동 시점
            const tSlow = bHY ? 10000 / Math.min(swPre, hyPre) : 0; // 은랑/히아킨 중 느린 쪽 시점

            // 상태별 속도 정의
            const vAha0 = getAhaSpeed(swPre, hkPre, spPre);
            
            // 1단계: 히아킨 시점 (38% 적용)
            const sw1 = swPre + (bHY ? STATS.SW * 0.38 : 0);
            const hk1 = hkPre + (bHY ? STATS.HK * 0.38 : 0);
            const sp1 = spPre + (bHY ? STATS.SP * 0.38 : 0);
            const vAha1 = getAhaSpeed(sw1, hk1, sp1);

            // 2단계: 느린 쪽 시점 (메신저 12% 추가 적용)
            const msRate = bMS ? 0.12 : 0;
            const swFinal = sw1 + (bHY ? STATS.SW * msRate : 0);
            const hkFinal = hk1 + (bHY ? STATS.HK * msRate : 0);
            const spFinal = sp1 + (bHY ? STATS.SP * msRate : 0);
            const vAhaFinal = getAhaSpeed(swFinal, hkFinal, spFinal);

            let ahaAv, spAv;
            if (!bHY) {
                ahaAv = 10000 / vAhaFinal;
                spAv = 10000 / spFinal;
            } else {
                // 아하 거리 시뮬레이션
                const distAha1 = vAha0 * tHy;
                const distAha2 = vAha1 * (tSlow - tHy);
                ahaAv = tSlow + (10000 - (distAha1 + distAha2)) / vAhaFinal;

                // 스파키 거리 시뮬레이션
                const distSp1 = spPre * tHy;
                const distSp2 = sp1 * (tSlow - tHy);
                spAv = tSlow + (10000 - (distSp1 + distSp2)) / spFinal;
            }

            return { ahaAv, spAv, swFinal, hkFinal, spFinal, vAhaFinal, tHy, tSlow };
        }

        let low = 50, high = 400, best = 400;
        for(let i=0; i<50; i++) {
            let mid = (low + high) / 2;
            if (runSim(mid).spAv < (runSim(mid).ahaAv - 0.009999)) { best = mid; high = mid; } else { low = mid; }
        }

        const f = runSim(best);
        document.getElementById('resSW').innerText = f.swFinal.toFixed(2);
        document.getElementById('resHK').innerText = f.hkFinal.toFixed(2);
        document.getElementById('resSP').innerText = f.spFinal.toFixed(2);
        document.getElementById('resAhaV').innerText = f.vAhaFinal.toFixed(2);
        document.getElementById('resSpTarget').innerText = best.toFixed(2);
        document.getElementById('resAhaAv').innerText = f.ahaAv.toFixed(3);
        document.getElementById('resSpAv').innerText = f.spAv.toFixed(3);

        document.getElementById('debugBox').innerHTML = `
            <b>[Internal High-Precision Data]</b><br>
            - t1 (히아킨 행동): ${f.tHy.toFixed(6)} AV<br>
            - t2 (느린 쪽 행동): ${f.tSlow.toFixed(6)} AV<br>
            - 아하 최종 속도: ${f.vAhaFinal.toFixed(6)}<br>
            - AV 차이 (Aha - Sparky): ${(f.ahaAv - f.spAv).toFixed(6)}<br>
            - 메신저 추가 버프: ${bMS ? '12% 적용' : '미적용'}
        `;
    }
    window.onload = updateUI;
</script>

</body>
</html>
