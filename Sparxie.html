<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스파키 계산기</title>
    <style>
        :root {
            --bg-color: #0f1218;
            --card-bg: #1c212d;
            --accent-color: #4a90e2;
            --text-color: #e0e0e0;
            --highlight: #f39c12;
            --border-color: #34495e;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .input-box {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        input[type="number"] {
            background: #2c3e50;
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 1rem;
        }

        .buff-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .checkbox-container:hover {
            background: rgba(255,255,255,0.1);
        }

        .checkbox-container input {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .results {
            background: rgba(74, 144, 226, 0.1);
            border: 1px dashed var(--accent-color);
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .result-item.main {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
            margin-top: 10px;
            font-weight: bold;
            color: var(--highlight);
            font-size: 1.1rem;
        }

        .val { font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h1>SPEED CALCULATOR</h1>

    <div class="section">
        <div class="section-title">기본 마을 속도 입력</div>
        <div class="input-group">
            <div class="input-box">
                <label>은랑</label>
                <input type="number" id="swBase" value="140" step="0.1" oninput="calculate()">
            </div>
            <div class="input-box">
                <label>효광</label>
                <input type="number" id="hkBase" value="140" step="0.1" oninput="calculate()">
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">버프 활성화</div>
        <div class="buff-group">
            <label class="checkbox-container">
                <input type="checkbox" id="buffHK" onchange="calculate()"> 효광 2돌 (기초 속도 12%)
            </label>
            <label class="checkbox-container">
                <input type="checkbox" id="buffHH" onchange="calculate()"> 곽향 1돌 (기초 속도 12%)
            </label>
            <label class="checkbox-container">
                <input type="checkbox" id="buffHY" onchange="calculate()"> 히아킨 2돌 (기초 속도 38%)
            </label>
        </div>
    </div>

    <div class="results">
        <div class="section-title" style="border-color: var(--highlight); color: var(--highlight);">계산 결과</div>
        <div class="result-item">
            <span>은랑 전투 속도</span>
            <span class="val" id="swCombat">-</span>
        </div>
        <div class="result-item">
            <span>효광 전투 속도</span>
            <span class="val" id="hkCombat">-</span>
        </div>
        <div class="result-item">
            <span>아하 전투 속도</span>
            <span class="val" id="ahaCombat">-</span>
        </div>
        <div class="result-item main">
            <span>스파키 목표 마을 속도</span>
            <span class="val" id="spTargetBase">-</span>
        </div>
        <div style="font-size: 0.75rem; color: #777; margin-top: 10px; text-align: center;">
            * 아하보다 0.01 이상 빠르게 계산됨
        </div>
    </div>
</div>

<script>
    function calculate() {
        // 기초 수치
        const SW_STAT = 110;
        const HK_STAT = 101;
        const SP_STAT = 107;

        // 입력값
        const swBase = parseFloat(document.getElementById('swBase').value) || 0;
        const hkBase = parseFloat(document.getElementById('hkBase').value) || 0;

        // 버프 체크
        const bHK = document.getElementById('buffHK').checked;
        const bHH = document.getElementById('buffHH').checked;
        const bHY = document.getElementById('buffHY').checked;

        const getBuffBonus = (stat) => {
            let bonus = 0;
            if (bHK) bonus += stat * 0.12;
            if (bHH) bonus += stat * 0.12;
            if (bHY) bonus += stat * 0.38;
            return bonus;
        };

        // 은랑, 효광 전투 속도
        const swCombat = swBase + getBuffBonus(SW_STAT);
        const hkCombat = hkBase + getBuffBonus(HK_STAT);

        document.getElementById('swCombat').innerText = swCombat.toFixed(2);
        document.getElementById('hkCombat').innerText = hkCombat.toFixed(2);

        // 스파키 최적화 계산 로직
        const o1 = Math.max(swCombat, hkCombat);
        const o2 = Math.min(swCombat, hkCombat);

        // 아하 속도 결정 공식에 따른 3가지 케이스 역산
        // T1: 스파키가 1위일 때, T2: 2위일 때, T3: 3위일 때
        const t1 = (80 + o1/10 + o2/20) * 1.25;
        const t2 = (80 + o1/5 + o2/20) * 1.111111;
        const t3 = (80 + o1/5 + o2/10) * 1.052631;

        let requiredCombat;
        if (t1 > o1) {
            requiredCombat = t1 + 0.01;
        } else if (t2 > o2) {
            requiredCombat = t2 + 0.01;
        } else {
            requiredCombat = t3 + 0.01;
        }

        // 결과 역산 (전투 -> 마을)
        const spTargetBase = requiredCombat - getBuffBonus(SP_STAT);
        
        // 아하 최종 속도 (검증용)
        const speeds = [swCombat, hkCombat, requiredCombat].sort((a,b) => b - a);
        const ahaCombat = 80 + speeds[0]/5 + speeds[1]/10 + speeds[2]/20;

        document.getElementById('spTargetBase').innerText = spTargetBase.toFixed(2);
        document.getElementById('ahaCombat').innerText = ahaCombat.toFixed(2);
    }

    // 초기 실행
    window.onload = calculate;
</script>

</body>
</html>
